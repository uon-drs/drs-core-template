variables:
  environment: 'dev'
  resourceGroupName: 'templateapp-dev-rg'
  azureLocation: 'australiaeast'

  # Bicep parameters — non-secret values for this environment
  aspSkuName: 'B1'
  postgresAdminLogin: 'templateappadmin'
  keycloakAuthority: 'https://keycloak.example.com/realms/templateapp'
  keycloakApiAudience: 'templateapp-api'
  keycloakFrontendClientId: 'templateapp-frontend'
  keycloakIssuerUrl: 'https://keycloak.example.com/realms/templateapp'

  # Secret variables are stored in the ADO Variable Group 'templateapp-dev-secrets':
  #   postgresAdminPassword  (mark as secret)
  #   keycloakClientSecret   (mark as secret)
  #   nextauthSecret         (mark as secret)
